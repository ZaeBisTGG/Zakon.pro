<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свой текст Справочник</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 1. ПЕРЕМЕННЫЕ И ТЕМЫ --- */
        :root {
            /* Стандартная тема (Dark Blue) */
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg-grad-1: #1e293b;
            --bg-grad-2: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-hover: rgba(51, 65, 85, 0.8);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --warning: #fbbf24;
            --warning-bg: rgba(251, 191, 36, 0.15);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.15);
        }

        /* Светлая тема */
        [data-theme="light"] {
            --bg-grad-1: #e2e8f0;
            --bg-grad-2: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-hover: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --warning: #d97706;
            --warning-bg: rgba(217, 119, 6, 0.1);
        }

        /* Черная тема (AMOLED) */
        [data-theme="black"] {
            --bg-grad-1: #000000;
            --bg-grad-2: #050505;
            --card-bg: rgba(20, 20, 20, 0.9);
            --card-hover: #262626;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
        }

        /* --- 2. СКРЫВАЕМ ПОЛОСУ ПРОКРУТКИ --- */
        ::-webkit-scrollbar { width: 0; background: transparent; }
        html { scrollbar-width: none; }
        body { -ms-overflow-style: none; }

        /* --- 3. ОСНОВНЫЕ СТИЛИ --- */
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, var(--bg-grad-1), var(--bg-grad-2));
            background-attachment: fixed;
            background-size: cover;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: var(--text-main); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        [data-theme="light"] h1 {
            background: linear-gradient(135deg, #475569 0%, #0f172a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        kbd {
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: monospace;
            box-shadow: 0 2px 0 rgba(0,0,0,0.5);
        }
        
        [data-theme="light"] kbd {
             background: rgba(0,0,0,0.05);
             border-color: rgba(0,0,0,0.1);
             box-shadow: none;
        }

        /* Предупреждение */
        .alert-box {
            background: var(--danger-bg);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 40px;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        .alert-box strong { color: #ff6b6b; letter-spacing: 0.5px; }
        .alert-box p { margin: 5px 0 0; font-size: 0.9em; color: var(--text-muted); }

        /* Категории */
        .category-block { margin-bottom: 50px; }

        .category-title {
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-glow);
            display: inline-block;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        /* Карточка правила */
        .rule-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            margin-bottom: 12px;
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }
        
        [data-theme="light"] .rule-row { border-color: rgba(0,0,0,0.05); }

        .rule-row:hover {
            transform: translateX(5px);
            background: var(--card-hover);
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .rule-name {
            flex: 1;
            padding-right: 20px;
            font-weight: 500;
            line-height: 1.4;
        }

        .rule-punishment {
            flex: 0 0 auto;
            text-align: right;
            color: var(--warning);
            font-size: 0.85rem;
            font-weight: 600;
            background: var(--warning-bg);
            padding: 6px 12px;
            border-radius: 8px;
            white-space: pre-wrap;
            max-width: 40%;
        }

        .severe {
            color: #f87171;
            background: var(--danger-bg);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.1);
        }

        /* Кнопка Назад */
        .back-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(128,128,128, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            margin-bottom: 20px;
            display: inline-block;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
        [data-theme="light"] .back-btn:hover { background: rgba(0,0,0,0.05); }


        /* Модальное окно поиска */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding-top: 100px;
            animation: fadeIn 0.2s;
        }

        .modal-content {
            background: var(--bg-grad-1);
            width: 90%;
            max-width: 700px;
            border-radius: 16px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 40px var(--primary-glow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 70vh;
        }

        .search-header { padding: 20px; background: rgba(0,0,0,0.1); border-bottom: 1px solid rgba(255,255,255,0.05); }

        input#search-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        input#search-input::placeholder { color: var(--text-muted); }

        .search-results { overflow-y: auto; padding: 0; }

        .result-item {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.2s;
        }
        .result-item:hover { background: var(--card-hover); }
        .result-category { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        
        .result-highlight {
            background: rgba(99, 102, 241, 0.3);
            color: #fff;
            border-radius: 2px;
            padding: 0 2px;
        }
        [data-theme="light"] .result-highlight { color: #000; }

        .empty-state { padding: 30px; text-align: center; color: var(--text-muted); }
        
        /* Кнопка поиска для мобильных */
        .fab-search {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px var(--primary-glow);
            cursor: pointer;
            z-index: 900;
            transition: 0.2s;
            color: #fff;
        }
        .fab-search:hover { transform: scale(1.1); }
        .fab-icon { font-size: 24px; }

    </style>
</head>
<body>

<script>
    (function() {
        // --- Загрузка темы ---
        const savedTheme = localStorage.getItem('siteTheme') || 'default';
        document.body.setAttribute('data-theme', savedTheme);

        const isGlow = localStorage.getItem('glowEffect') !== 'false';
        if (!isGlow) {
            document.documentElement.style.setProperty('--primary-glow', 'rgba(0, 0, 0, 0)');
        }
    })();
</script>

    <div class="container">
        <button class="back-btn" onclick="window.location.href='xx.html'">← В меню</button>

        <h1>Справочник</h1>
        <div class="subtitle">Используйте <kbd>Ctrl</kbd> + <kbd>F</kbd> для быстрого поиска</div>

        <div class="alert-box">
            <strong>⚠️ ВНИМАНИЕ!</strong>
            <p>Свой текст</p>
        </div>
        
        <div id="rules-container"></div>
    </div>

    <div id="search-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="search-header">
                <input type="text" id="search-input" placeholder="Введите название нарушения..." autocomplete="off">
            </div>
            <div id="search-results" class="search-results">
                <div class="empty-state">Начните вводить текст...</div>
            </div>
        </div>
    </div>

<script>
    // БАЗА ДАННЫХ ПРАВИЛ
    const rulesData = [
        {
            category: "Правила взаимодействия администрации с игроками",
            items: [
                ["Потеря имущества (взлом/софт)", "Администрация не несет ответственности"],
                ["Запрос пароля от аккаунта", "Строго запрещено (Снятие / ЧС)"],
                ["Игнор репорта при наличии очереди", "Выговор / Снятие"],
                ["Нарушение правил сервера (в т.ч. чатов)", "Выговор / Снятие"],
                ["Игнорирование требований ГА/ЗГА", "Выговор / Снятие"],
                ["Назначение на пост (Обзвон / Лидерка 15-25 дней)", "Согласно правилам"],
                ["Восстановление (от 30 до 150 дней после ухода)", "Согласно условиям ГА"],
                ["Решение ГА по составу (снятие/отказ без причин)", "Право Главной Администрации"],
                ["Уход ПСЖ сразу / Серьезные нарушения", "Бан / ЧС Администрации"],
                ["Неуважительное отношение к игрокам", "Выговор / Снятие"],
                ["Помеха РП процессу (админ — нонРП персонаж)", "Выговор"],
                ["Использование функционала в личных целях", "Снятие / ЧС"],
                ["Участие в слетах имущества", "Снятие / ЧС"],
                ["Владение имуществом (кроме транспорта)", "Снятие / Изъятие"],
                ["Экономическое взаимодействие с игроками", "Строгий выговор / Снятие"],
                ["Получение подарков от игроков", "Только с одобрения ГА / Снятие"],
                ["Описание персонажа и АФК-описание", "Очистка / Выговор"],
                ["Игра с твинков на своем сервере", "Снятие / ЧС"],
                ["Провокационные реакции на форуме", "Беседа / Выговор"],
                ["Превышение нормы АФК / АФК при очереди", "Выговор"],
                ["Прохождение праздничных квестов (при репорте)", "Выговор"],
                ["Выпрашивание поощрений у игроков", "Выговор / Снятие"],
                ["Выдача ХП/Транспорта/Денег без причины", "Запрещено / Выговор"],
                ["Выбор меры наказания", "В пределах нормы / Выговор"],
                ["Срок наказания игрока (жалоба)", "До 3-х дней"],
                ["Хранение доказательств (опры)", "В течение срока подачи жалобы"]
            ]
        },

    ];

    // ГЕНЕРАЦИЯ СПИСКА
    const container = document.getElementById('rules-container');
    
    rulesData.forEach(cat => {
        const catDiv = document.createElement('div');
        catDiv.className = 'category-block';
        
        const title = document.createElement('div');
        title.className = 'category-title';
        title.textContent = cat.category;
        catDiv.appendChild(title);

        cat.items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'rule-row';
            
            // Проверка на жесткие наказания для красного стиля
            const isSevere = item[1].toLowerCase().includes('2000') || 
                             item[1].toLowerCase().includes('бан') || 
                             item[1].toLowerCase().includes('чс') ||
                             item[1].toLowerCase().includes('снятие');
                             
            const punishClass = isSevere ? 'rule-punishment severe' : 'rule-punishment';

            row.innerHTML = `
                <div class="rule-name">${item[0]}</div>
                <div class="${punishClass}">${item[1]}</div>
            `;
            catDiv.appendChild(row);
        });

        container.appendChild(catDiv);
    });

    // ПОИСК
    const modal = document.getElementById('search-modal');
    const input = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');

    function openSearch() {
        modal.style.display = 'flex';
        input.focus();
    }

    function performSearch(query) {
        resultsContainer.innerHTML = '';
        if (!query) {
            resultsContainer.innerHTML = '<div class="empty-state">Начните вводить текст...</div>';
            return;
        }

        const lowerQuery = query.toLowerCase();
        let count = 0;

        rulesData.forEach(cat => {
            cat.items.forEach(item => {
                const name = item[0];
                const punish = item[1];
                
                // ВАЖНОЕ ИЗМЕНЕНИЕ: ИЩЕМ ТОЛЬКО ПО ИМЕНИ ПРАВИЛА
                if (name.toLowerCase().includes(lowerQuery)) {
                    const el = document.createElement('div');
                    el.className = 'result-item';
                    
                    // Подсветка найденного текста
                    const highlight = (text) => {
                        const regex = new RegExp(`(${query})`, 'gi');
                        return text.replace(regex, '<span class="result-highlight">$1</span>');
                    };

                    el.innerHTML = `
                        <div class="result-category">${cat.category}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-weight:500; margin-right:15px;">${highlight(name)}</span>
                            <span style="color:var(--warning); font-size:0.85em;">${punish}</span>
                        </div>
                    `;
                    
                    // Прокрутка к правилу при клике
                    el.onclick = () => {
                        modal.style.display = 'none';
                        const elements = document.querySelectorAll('.rule-name');
                        for (let elem of elements) {
                            if (elem.innerText === name) {
                                elem.scrollIntoView({behavior: "smooth", block: "center"});
                                elem.parentElement.style.border = '2px solid var(--primary)';
                                setTimeout(() => elem.parentElement.style.border = '1px solid rgba(255,255,255,0.05)', 2000);
                                break;
                            }
                        }
                    };

                    resultsContainer.appendChild(el);
                    count++;
                }
            });
        });

        if (count === 0) {
            resultsContainer.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
        }
    }

    input.addEventListener('input', (e) => performSearch(e.target.value));

    // Hotkeys
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && (e.key === 'f' || e.key === 'а' || e.key === 'F')) {
            e.preventDefault();
            openSearch();
        }
        if (e.key === 'Escape') {
            modal.style.display = 'none';
            input.value = '';
            performSearch('');
        }
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.style.display = 'none';
    });
</script>

</body>
</html>
